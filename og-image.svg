<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Stardust — brief + seed = star">
  <defs>
    <radialGradient id="covSky" cx="72%" cy="42%" r="62%">
      <stop offset="0" stop-color="#1a2450"/>
      <stop offset="0.6" stop-color="#0a1126"/>
      <stop offset="1" stop-color="#060a14"/>
    </radialGradient>
    <radialGradient id="covGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#e8b95e" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#e8b95e" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1280" height="640" fill="url(#covSky)"/>
  <circle cx="960" cy="320" r="280" fill="url(#covGlow)"/>

  <!-- dust field -->
  <g fill="#f5f0e6">
    <circle cx="80" cy="100" r="1.3" opacity="0.28"/>
    <circle cx="160" cy="200" r="1" opacity="0.22"/>
    <circle cx="240" cy="80" r="1.2" opacity="0.24"/>
    <circle cx="60" cy="540" r="1.1" opacity="0.22"/>
    <circle cx="420" cy="580" r="0.9" opacity="0.2"/>
    <circle cx="320" cy="500" r="1" opacity="0.2"/>
    <circle cx="140" cy="440" r="0.8" opacity="0.18"/>
    <circle cx="1180" cy="100" r="1.2" opacity="0.26"/>
    <circle cx="1220" cy="200" r="1" opacity="0.2"/>
    <circle cx="1240" cy="480" r="1.1" opacity="0.22"/>
    <circle cx="1140" cy="560" r="0.9" opacity="0.2"/>
    <circle cx="660" cy="90" r="0.8" opacity="0.18"/>
    <circle cx="720" cy="570" r="1" opacity="0.22"/>
  </g>

  <!-- Star -->
  <g transform="translate(960, 320)">
    <g fill="#e8b95e">
      <rect x="-12" y="-220" width="24" height="24"/>
      <rect x="-12" y="-192" width="24" height="24" opacity="0.7"/>
      <rect x="-12" y="-164" width="24" height="24" opacity="0.5"/>
      <rect x="-12" y="164" width="24" height="24" opacity="0.5"/>
      <rect x="-12" y="192" width="24" height="24" opacity="0.7"/>
      <rect x="-12" y="220" width="24" height="24"/>
      <rect x="-220" y="-12" width="24" height="24"/>
      <rect x="-192" y="-12" width="24" height="24" opacity="0.7"/>
      <rect x="-164" y="-12" width="24" height="24" opacity="0.5"/>
      <rect x="164" y="-12" width="24" height="24" opacity="0.5"/>
      <rect x="192" y="-12" width="24" height="24" opacity="0.7"/>
      <rect x="220" y="-12" width="24" height="24"/>
    </g>
    <rect x="-36" y="-36" width="72" height="72" fill="#ffd98a"/>
    <g fill="#e8b95e" opacity="0.55">
      <rect x="-92" y="-92" width="20" height="20"/>
      <rect x="72" y="-92" width="20" height="20"/>
      <rect x="-92" y="72" width="20" height="20"/>
      <rect x="72" y="72" width="20" height="20"/>
    </g>
  </g>

  <!-- Wordmark + tag -->
  <g font-family="'SF Pro Display', 'Helvetica Neue', system-ui, sans-serif" fill="#f5f0e6">
    <text x="80" y="280" font-size="108" font-weight="600" letter-spacing="-3">stardust</text>
  </g>
  <g font-family="'SF Mono', ui-monospace, Menlo, monospace" fill="#e8b95e">
    <text x="82" y="320" font-size="18" letter-spacing="6">BRIEF  +  SEED  =  STAR</text>
  </g>
  <g font-family="'SF Pro Display', 'Helvetica Neue', system-ui, sans-serif" fill="#f5f0e6">
    <text x="80" y="384" font-size="22" font-weight="400" opacity="0.72" letter-spacing="-0.2">
      <tspan>Design-phase skills for static-HTML projects.</tspan>
      <tspan x="80" dy="30" opacity="0.58">Deterministic, not mystical. Curated, not invented.</tspan>
      <tspan x="80" dy="30" opacity="0.58">Yours alone, today only.</tspan>
    </text>
  </g>

  <!-- Stage labels -->
  <g font-family="'SF Mono', ui-monospace, Menlo, monospace" fill="#f5f0e6" opacity="0.45" font-size="12" letter-spacing="2">
    <text x="80" y="568">01  BRAND</text>
    <text x="200" y="568">·  02  BRIEFINGS</text>
    <text x="350" y="568">·  03  WIREFRAMES</text>
    <text x="510" y="568">·  04  PROTOTYPE</text>
  </g>

  <!-- Seed footnote -->
  <g font-family="'SF Mono', ui-monospace, Menlo, monospace" fill="#e8b95e" opacity="0.5" font-size="11" letter-spacing="1.5">
    <text x="80" y="600">md5("stardust" · 2026-04-24) → a3f7c92e 8b1d488a 0c5ef691 3427bbd1</text>
  </g>

  <!-- Install hint -->
  <g font-family="'SF Mono', ui-monospace, Menlo, monospace" fill="#f5f0e6" opacity="0.4" font-size="11" letter-spacing="1.5" text-anchor="end">
    <text x="1200" y="600">/plugin install stardust@adobe-skills</text>
  </g>
</svg>
