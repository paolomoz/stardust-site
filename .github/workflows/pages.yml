name: Deploy to GitHub Pages

# Publishes the static site to https://stardust.style/ (custom domain via CNAME).
# Source HTML uses absolute paths starting with `/`, which now resolve at root.
#
# One-time repo setup:
#   Settings → Pages → Source: GitHub Actions
#   Settings → Pages → Custom domain: stardust.style (CNAME file in repo root)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stage site
        run: |
          set -euo pipefail
          mkdir -p _site
          # /samples/ is internal showcase tooling. Per-slug data folders deploy so
          # /sample.html can fetch them, plus the renamed showcase index lives at an
          # intentionally unguessable filename (samples/showcase-<random>.html). The
          # bare /samples/ and /samples/index.html paths must 404.
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='_site' \
            --exclude='README.md' \
            --exclude='_identity' \
            --exclude='og-mock.html' \
            --exclude='samples/README.md' \
            --exclude='samples/sample-format.md' \
            --exclude='samples/brand.html' \
            --exclude='samples/favicon.svg' \
            --exclude='samples/og-image.jpg' \
            --exclude='samples/og-image.svg' \
            ./ _site/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
